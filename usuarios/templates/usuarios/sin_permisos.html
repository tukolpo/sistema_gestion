{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Denegado | Sistema de Gestión DSI</title>
  <link rel="stylesheet" href="{% static 'usuarios/css/styles.css' %}">
</head>
<body>
<div class="pagina-error" role="main">
  <div class="icono-error" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0

           2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>

  </div>
  <h1>Acceso Denegado</h1>
  <p>{{ mensaje|default:"Tu rol no tiene los permisos suficientes para acceder a esta sección." }}</p>
  <a href="{% url 'usuarios:dashboard' %}" class="btn-volver">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="2" style="width:16px;height:16px;" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>

  </a>
</div>
<script src="{% static 'usuarios/js/validaciones.js' %}"></script>

</html>
